name: Report Monthly

on:
  schedule:
    - cron: "0 0 1 * *"
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true

      - name: Init Git LFS
        run: git lfs install

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install feedparser requests trafilatura pyyaml

      - name: Init database
        run: python scripts/db_init.py report

      - name: Ingest RSS + download PDFs (report.db)
        run: python scripts/ingest_rss.py report

      - name: Render HTML + export PDFs
        run: python scripts/render_report.py

      - name: Read subject
        id: subject
        run: echo "value=$(cat out_report_subject.txt)" >> "$GITHUB_OUTPUT"

      - name: Build PDF attachment list
        id: attachments
        run: |
          files=$(find out_report_pdfs -name "*.pdf" 2>/dev/null | tr '\n' ',' | sed 's/,$//')
          # always include report.db; append PDFs if any
          if [ -n "$files" ]; then
            echo "value=database/report.db,${files}" >> "$GITHUB_OUTPUT"
          else
            echo "value=database/report.db" >> "$GITHUB_OUTPUT"
          fi

      - name: Send email
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ secrets.SMTP_USER }}
          password: ${{ secrets.SMTP_PASS }}
          to: ${{ secrets.TO_EMAIL }}
          from: Dewsletter <${{ secrets.SMTP_USER }}>
          subject: ${{ steps.subject.outputs.value }}
          html_body: file://out_report.html
          attachments: ${{ steps.attachments.outputs.value }}

      - name: Commit database (LFS)
        continue-on-error: true
        run: |
          git config user.name  github-actions
          git config user.email github-actions@github.com
          git add database/report.db
          git commit -m "report monthly · $(date -u +'%Y-%m')" || true
          git push || true
