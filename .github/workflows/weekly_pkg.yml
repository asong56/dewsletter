name: Weekly Package

on:
  schedule:
    - cron: "0 22 * * 0"
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true        # pull existing LFS objects on checkout

      - name: Init Git LFS
        run: git lfs install

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install feedparser requests trafilatura yt-dlp markdown
          sudo apt-get update -qq
          sudo apt-get install -y ffmpeg

      - name: Init DB (+ migrate schema)
        run: python scripts/db_init.py

      # =========================
      # RETRY failed sources
      # =========================
      - name: Retry failed sources
        run: |
          python - << 'EOF'
          import os, sqlite3, subprocess

          conn    = sqlite3.connect("current.db")
          sources = [r[0] for r in conn.execute("SELECT DISTINCT source_id FROM errors").fetchall()]
          conn.close()

          for s in sources:
              print("retry:", s)
              script = "scripts/youtube.py" if "youtube" in s else "scripts/rss.py"
              subprocess.run(["python", script], env={**os.environ, "RETRY_ONLY_SOURCE": s})
          EOF

      # =========================
      # ARCHIVE current → archive.db
      # archive.db is tracked by Git LFS (.gitattributes)
      # =========================
      - name: Merge into archive
        run: python scripts/archive.py

      # =========================
      # RENDER weekly HTML
      # =========================
      - name: Render weekly HTML
        run: python scripts/render_weekly.py

      - name: Read subject
        id: subject
        run: echo "value=$(cat weekly_subject.txt)" >> "$GITHUB_OUTPUT"

      # =========================
      # SEND EMAIL
      # =========================
      - name: Send weekly digest
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ secrets.SMTP_USER }}
          password: ${{ secrets.SMTP_PASS }}
          to: ${{ secrets.TO_EMAIL }}
          from: nodeu2c <${{ secrets.SMTP_USER }}>
          subject: ${{ steps.subject.outputs.value }}
          body: |
            Attachments:
              weekly.html  — open in any browser (no VPN, no tools)
              current.db   — raw SQLite database for local search
          attachments: weekly.html,current.db

      # =========================
      # RESET current.db
      # =========================
      - name: Reset DB
        run: |
          rm -f current.db
          python scripts/db_init.py

      # =========================
      # COMMIT
      # archive.db is pushed as an LFS pointer — actual binary goes to LFS storage
      # =========================
      - name: Commit
        run: |
          git config user.name  github-actions
          git config user.email github-actions@github.com
          git add current.db archive.db
          git commit -m "weekly reset · $(date +'%Y-%m-%d')" || true
          git push
