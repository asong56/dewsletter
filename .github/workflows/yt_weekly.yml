name: YouTube Weekly

on:
  schedule:
    - cron: "0 0 * * 3"
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true

      - name: Init Git LFS
        run: git lfs install

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y ffmpeg

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: pip install feedparser requests pyyaml yt-dlp

      - name: Init database
        run: python scripts/db_init.py youtube

      - name: Ingest YouTube subtitles (youtube.db)
        run: python scripts/ingest_youtube.py
        env:
          YT_WORKERS: "3"
          LOOKBACK_DAYS: "8"

      - name: Render HTML
        run: python scripts/render_yt.py

      - name: Read subject
        id: subject
        run: echo "value=$(cat out_yt_subject.txt)" >> "$GITHUB_OUTPUT"

      - name: Send email
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ secrets.SMTP_USER }}
          password: ${{ secrets.SMTP_PASS }}
          to: ${{ secrets.TO_EMAIL }}
          from: Dewsletter <${{ secrets.SMTP_USER }}>
          subject: ${{ steps.subject.outputs.value }}
          html_body: file://out_yt.html
          attachments: database/youtube.db

      - name: Commit database (LFS)
        continue-on-error: true
        run: |
          git config user.name  github-actions
          git config user.email github-actions@github.com
          git add database/youtube.db
          git commit -m "yt weekly · $(date -u +'%Y-%m-%d')" || true
          git push || true
