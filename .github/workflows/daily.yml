name: Daily

on:
  schedule:
    - cron: "0 20 * * *"   # 04:00 BJT (UTC+8)
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true

      - name: Init Git LFS
        run: git lfs install

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install feedparser requests trafilatura pyyaml

      - name: Init databases
        run: python scripts/db_init.py core hn

      - name: Ingest RSS (core.db)
        run: python scripts/ingest_rss.py core

      - name: Ingest HackerNews (hn.db)
        run: python scripts/ingest_hn.py

      - name: Render daily HTML
        run: python scripts/render_daily.py

      - name: Read subject
        id: subject
        run: echo "value=$(cat out_daily_subject.txt)" >> "$GITHUB_OUTPUT"

      - name: Send email
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ secrets.SMTP_USER }}
          password: ${{ secrets.SMTP_PASS }}
          to: ${{ secrets.TO_EMAIL }}
          from: Dewsletter <${{ secrets.SMTP_USER }}>
          subject: ${{ steps.subject.outputs.value }}
          html_body: file://out_daily.html

      - name: Commit databases (LFS)
        run: |
          git config user.name  github-actions
          git config user.email github-actions@github.com
          git add database/core.db database/hn.db
          git commit -m "daily · $(date -u +'%Y-%m-%d')" || true
          git push
