name: Dive Weekly

on:
  schedule:
    - cron: "0 0 * * 6"   # 08:00 BJT Saturday
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true

      - name: Init Git LFS
        run: git lfs install

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install feedparser requests trafilatura pyyaml

      - name: Init database
        run: python scripts/db_init.py dive

      - name: Ingest RSS (dive.db)
        run: python scripts/ingest_rss.py dive

      - name: Render HTML
        run: python scripts/render_dive.py

      - name: Read subject
        id: subject
        run: echo "value=$(cat out_dive_subject.txt)" >> "$GITHUB_OUTPUT"

      - name: Send email
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ secrets.SMTP_USER }}
          password: ${{ secrets.SMTP_PASS }}
          to: ${{ secrets.TO_EMAIL }}
          from: Dewsletter <${{ secrets.SMTP_USER }}>
          subject: ${{ steps.subject.outputs.value }}
          html_body: file://out_dive.html

      - name: Commit database (LFS)
        run: |
          git config user.name  github-actions
          git config user.email github-actions@github.com
          git add database/dive.db
          git commit -m "dive weekly · $(date -u +'%Y-%m-%d')" || true
          git push
