name: Daily Ingest

on:
  schedule:
    - cron: "0 14 * * *"
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - run: pip install feedparser requests trafilatura yt-dlp

      - run: sudo apt-get install -y ffmpeg

      - run: python scripts/db_init.py

      - run: python scripts/rss.py
      - run: python scripts/youtube.py

      - run: |
          git config user.name github-actions
          git config user.email github-actions@github.com
          git add current.db
          git commit -m "daily" || true
          git push
